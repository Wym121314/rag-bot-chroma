# ============================================
#  Docker Compose — 一键启动
# ============================================
#  启动: docker-compose up --build
#  停止: docker-compose down
# ============================================

services:
  rag-bot:
    build: .                        # 用当前目录的 Dockerfile 构建
    ports:
      - "8501:8501"                 # 映射端口：宿主机 8501 → 容器 8501
    env_file:
      - .env                        # 读取 .env 中的 API 密钥
    volumes:
      - ./data:/app/data            # 持久化向量库数据（容器重启不丢失）
    restart: unless-stopped         # 崩溃自动重启，手动停止除外
